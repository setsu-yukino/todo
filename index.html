<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo アプリ</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #2d3142;
      --muted: #9aa0ad;
      --accent: #4f6df5;
      --accent-soft: #eaeefe;
      --danger: #e5484d;
      --border: #e6e8ec;
      --done: #b4b9c4;
      --shadow: 0 8px 30px rgba(45, 49, 66, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      width: 100%;
      max-width: 520px;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .date { color: var(--muted); font-size: 13px; }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .input-row {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    #new-task {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #new-task:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .add-btn {
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 0 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .add-btn:hover { filter: brightness(1.05); }
    .add-btn:active { transform: translateY(1px); }

    ul { list-style: none; }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      animation: fade 0.2s ease;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
    .check {
      appearance: none;
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .check:hover { border-color: var(--accent); }
    .check:checked { background: var(--accent); border-color: var(--accent); }
    .check:checked::after {
      content: "";
      position: absolute;
      left: 6px; top: 2px;
      width: 5px; height: 10px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .text {
      flex: 1;
      font-size: 15px;
      cursor: text;
      word-break: break-word;
    }
    .item.done .text { color: var(--done); text-decoration: line-through; }
    .edit-input {
      flex: 1;
      font-size: 15px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 6px 8px;
      outline: none;
    }
    .del {
      border: none;
      background: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transition: color 0.15s, opacity 0.15s;
      padding: 4px 6px;
      line-height: 1;
    }
    .item:hover .del { opacity: 1; }
    .del:hover { color: var(--danger); }

    .empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .filters { display: flex; gap: 4px; }
    .filter {
      border: none;
      background: none;
      color: var(--muted);
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .filter:hover { background: var(--bg); }
    .filter.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .clear {
      border: none;
      background: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }
    .clear:hover { color: var(--danger); }
    .clear:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Todo</h1>
      <span class="date" id="date"></span>
    </header>
    <div class="card">
      <div class="input-row">
        <input id="new-task" type="text" placeholder="新しいタスクを入力..." autocomplete="off" />
        <button class="add-btn" id="add">追加</button>
      </div>
      <ul id="list"></ul>
      <div class="empty" id="empty" hidden>タスクはありません 🎉</div>
      <footer>
        <span id="count">0 件</span>
        <div class="filters">
          <button class="filter active" data-filter="all">すべて</button>
          <button class="filter" data-filter="active">未完了</button>
          <button class="filter" data-filter="done">完了</button>
        </div>
        <button class="clear" id="clear">完了を削除</button>
      </footer>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "todo.tasks.v1";
    let tasks = load();
    let filter = "all";

    const el = {
      input: document.getElementById("new-task"),
      add: document.getElementById("add"),
      list: document.getElementById("list"),
      empty: document.getElementById("empty"),
      count: document.getElementById("count"),
      clear: document.getElementById("clear"),
      date: document.getElementById("date"),
    };

    el.date.textContent = new Date().toLocaleDateString("ja-JP", {
      year: "numeric", month: "long", day: "numeric", weekday: "short",
    });

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function addTask(text) {
      text = text.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now() + Math.random(), text, done: false });
      save();
      render();
    }
    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }
    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }
    function edit(id, text) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      text = text.trim();
      if (text) { t.text = text; save(); }
      render();
    }
    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }

    function visible() {
      if (filter === "active") return tasks.filter(t => !t.done);
      if (filter === "done") return tasks.filter(t => t.done);
      return tasks;
    }

    function render() {
      el.list.innerHTML = "";
      const items = visible();
      el.empty.hidden = items.length > 0;

      for (const t of items) {
        const li = document.createElement("li");
        li.className = "item" + (t.done ? " done" : "");

        const check = document.createElement("input");
        check.type = "checkbox";
        check.className = "check";
        check.checked = t.done;
        check.addEventListener("change", () => toggle(t.id));

        const span = document.createElement("span");
        span.className = "text";
        span.textContent = t.text;
        span.title = "クリックで編集";
        span.addEventListener("click", () => startEdit(li, span, t));

        const del = document.createElement("button");
        del.className = "del";
        del.innerHTML = "&times;";
        del.title = "削除";
        del.addEventListener("click", () => remove(t.id));

        li.append(check, span, del);
        el.list.appendChild(li);
      }

      const remaining = tasks.filter(t => !t.done).length;
      el.count.textContent = `未完了 ${remaining} 件 / 全 ${tasks.length} 件`;
      el.clear.disabled = !tasks.some(t => t.done);
    }

    function startEdit(li, span, t) {
      const input = document.createElement("input");
      input.className = "edit-input";
      input.value = t.text;
      li.replaceChild(input, span);
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);

      const commit = () => edit(t.id, input.value);
      input.addEventListener("blur", commit);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") { input.removeEventListener("blur", commit); render(); }
      });
    }

    el.add.addEventListener("click", () => { addTask(el.input.value); el.input.value = ""; el.input.focus(); });
    el.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { addTask(el.input.value); el.input.value = ""; }
    });
    el.clear.addEventListener("click", clearDone);

    document.querySelectorAll(".filter").forEach(btn => {
      btn.addEventListener("click", () => {
        filter = btn.dataset.filter;
        document.querySelectorAll(".filter").forEach(b => b.classList.toggle("active", b === btn));
        render();
      });
    });

    render();
  </script>
</body>
</html>
